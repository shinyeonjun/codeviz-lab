services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: codeviz
      POSTGRES_USER: codeviz
      POSTGRES_PASSWORD: codeviz
    ports:
      - "${POSTGRES_HOST_PORT:-55433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeviz -d codeviz"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
