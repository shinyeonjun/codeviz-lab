name: Deploy to GCP VM

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: codeviz
          POSTGRES_USER: codeviz
          POSTGRES_PASSWORD: codeviz
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U codeviz -d codeviz"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://codeviz:codeviz@127.0.0.1:5432/codeviz
      TEST_DATABASE_HOST: 127.0.0.1
      TEST_DATABASE_PORT: 5432
      TEST_DATABASE_USER: codeviz
      TEST_DATABASE_PASSWORD: codeviz
      RUNNER_BACKEND: local
      VISUALIZATION_SELECTOR_BACKEND: manual

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v6

      - name: Python 설정
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 백엔드 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: 백엔드 테스트
        run: |
          cd backend
          pytest -q

      - name: Node 설정
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 프론트 의존성 설치 및 빌드
        run: |
          cd frontend
          npm ci
          npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v6

      - name: 서버 디렉터리 준비
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          script: |
            set -e
            mkdir -p /opt/codeviz-lab

      - name: 서버에 파일 동기화
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          source: "."
          target: "/opt/codeviz-lab"
          overwrite: true
          rm: false

      - name: 서버에 배포
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          script: |
            set -e
            cd /opt/codeviz-lab
            chmod +x deploy/deploy.sh
            ./deploy/deploy.sh
